save-position-on-quit=yes
hwdec=auto
vo=gpu-next
profile=gpu-hq


scale=ewa_lanczossharp
cscale=ewa_lanczossharp

interpolation=yes
tscale=oversample

deband=yes

video-sync=display-resample

tone-mapping=mobius
hdr-compute-peak=yes

sub-auto=fuzzy
sub-font-size=20

volume=40
volume-max=200
audio-display=no
