unbind C-b
set -sg escape-time 0
set -g focus-events on
set -g default-terminal "tmux-256color"
set -g mouse on
set -ag terminal-overrides ",*:RGB"
set -g renumber-windows on
set -g history-limit 50000
set -g detach-on-destroy off

set -g prefix C-Space
bind C-Space send-prefix

set -g prefix2 F12
bind F12 send-prefix -2


unbind "'"
bind "'" select-window -t 0

unbind ,
bind , select-window -t 1

unbind .
bind . select-window -t 2

unbind p
bind p select-window -t 3

unbind y
bind y select-window -t 4

unbind r
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind K kill-session

unbind k
bind k confirm-before kill-pane

unbind n
bind n new-window

unbind f
bind f choose-tree -Z

unbind [
bind Escape copy-mode

# DESIGN TWEAKS
set -g status-style bg=default,fg=default
set -g status-left ''
set -g status-right ' #[fg=colour245,dim,italics]#S'

set -g window-status-format '#[fg=colour238,dim]●'
set -g window-status-current-format '#[fg=colour81,dim]●'
set -g window-status-separator ' '

set -g status-justify right

# Define colors (Maintaining your palette, but ignoring BG_COLOR for transparency)
ACTIVE_COLOR="#b4befe"
INACTIVE_COLOR="#6c7086"
TEXT_COLOR="#cdd6f4"

set -g status on
set -g status-position bottom
set -g status-interval 3
set -g status-justify left

# Status bar: bg=default creates the transparency
set -g status-style "bg=default,fg=$TEXT_COLOR"
set -g status-left-length 100
set -g status-right-length 100

# Pane borders: Thinned out for Arch/Hyprland aesthetics
set -g pane-border-style "fg=#44475a,bg=default"
set -g pane-active-border-style "fg=$ACTIVE_COLOR,bg=default"

# Message style (Command prompt)
set -g message-style "bg=default,fg=$TEXT_COLOR,bold"

# Window status format
# We use 'default' for bg to ensure no solid blocks appear behind text
set -g window-status-format "#[fg=$INACTIVE_COLOR,bg=default] #I:#W "
set -g window-status-current-format "#[fg=$ACTIVE_COLOR,bg=default,bold] #I:#W "
set -g window-status-separator ""

# Status left: Session name now uses INACTIVE_COLOR as requested
set -g status-left "#[fg=$INACTIVE_COLOR,bg=default]  #S #[fg=$INACTIVE_COLOR]│ "

# Status right: Keeping it empty or very minimal is more 'senior'
set -g status-right "#[fg=$INACTIVE_COLOR,bg=default] %H:%M "

# copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane
bind-key -T copy-mode-vi i send -X cancel

bind v split-window -h -c "#{pane_current_path}"
