state_file = "auto"
engine = "parakeet"

[hotkey]
mode = "toggle"
enabled = false
modifiers = []

[audio]
device = "default"
sample_rate = 16000
max_duration_secs = 240
enabled = true

[output]
mode = "type"
fallback_to_clipboard = true
type_delay_ms = 0
auto_submit = false

[output.notification]
on_recording_start = false 
on_recording_stop = false 
on_transcription = false 

[text]
spoken_punctuation = true 
enabled = false
# threshold = 0.5
# min_speech_duration_ms = 100

[meeting]
enabled = true

[transcription]
chunking = true


[parakeet]
model = "parakeet-tdt-0.6b-v3"
on_demand_loading = false

[vad]
enabled = true
backend = "whisper"

[whisper]
model = "large-v3-turbo"
mode = "local"
language = "en"
translate = false
flash_attention = false
on_demand_loading = false
gpu_isolation = false
