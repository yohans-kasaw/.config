source = ~/.config/hypr/env.conf
source = ~/.config/hypr/startup.conf

env = QT_QPA_PLATFORMTHEME, qt5ct
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

$mainMod = SUPER
$term = ghostty 
$brow = zen
$test_brow = firefox
$editor = nvim
$craft_ws = 2
$brow_ws = 3
$test_ws = 4
monitor = $monitor_laptop,preferred,auto,1
monitor = HDMI-A-1,preferred,auto,1

input {
    kb_layout = us
    resolve_binds_by_sym = 1
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
        disable_while_typing = true
        clickfinger_behavior = true
    }
    repeat_rate = 100
    repeat_delay = 200
}

device {
    name = $laptop_keyboard_name
    kb_variant = dvorak
    kb_options = caps:swapescape
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

cursor {
  inactive_timeout = 100
  default_monitor = HDMI-A-1
  hide_on_key_press = true
  warp_back_after_non_mouse_input = false
}


general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = rgba(33ccff4a) rgba(00ff994a) 45deg
    col.inactive_border = rgba(5959591a)
    allow_tearing = false
}

decoration {
  shadow {
    enabled = false
  }
  rounding = 10
  blur {
    enabled = false 
  }
}

misc {
    vrr = 1
    focus_on_activate = true
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    allow_session_lock_restore = true
}

animations {
    enabled = false
}

workspace=1,monitor:$monitor_laptop
workspace=$craft_ws,monitor:$monitor_external
workspace=$brow_ws,monitor:$monitor_external
workspace=$test_ws,monitor:$monitor_external
workspace = special:notes, on-created-empty: bash -c "cd ~/obsidian && ghostty -e nvim"
workspace = special:read, on-created-empty: bash -c "cd ~/projects/focus_read && ghostty -e ./focus_read --paste"

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = ignore-phantom-windows
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = on
}

windowrule {
    name = test-browser
    match:class = ^$test_brow$
    workspace = $test_ws
}

windowrule {
    name = browser
    match:class = ^$brow$
    workspace = $brow_ws
}

windowrule {
    name = norrow-windows 
    match:class = ^.*$term.*
    size = (monitor_w*0.75) (monitor_h)
    center = on
    pseudo = on
}


windowrule {
    name = read-popups
    match:workspace = name:special:notes
    match:workspace = name:special:read
    size = (monitor_w*1) (monitor_h*1)
}

bind = $mainMod, Return, exec, $term
bind = $mainMod, Space, cyclenext
bind = $mainMod , C, killactive
bind = $mainMod SHIFT, M, exit
bind = $mainMod, W, exec, makoctl dismiss
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod + SHIFT, C, exec, /home/yohansh/.config/hypr/rofi-wifi.sh
bind = $mainMod, R, exec, rofi -show drun
bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = SUPER SHIFT, V, exec, /home/yohansh/.config/hypr/rofi-prompt.py
bind = SUPER SHIFT, Space, exec, voxtype record toggle 

bind = $mainMod, Q, workspace, 1
bind = $mainMod, A, workspace, $craft_ws
bind = $mainMod, O, workspace, $brow_ws
bind = $mainMod, E, workspace, $test_ws
bind = $mainMod, L, togglespecialworkspace, read 
bind = $mainMod, S, togglespecialworkspace, notes

bind = $mainMod SHIFT, Q, movetoworkspace, 1
bind = $mainMod SHIFT, A, movetoworkspace, $craft_ws
bind = $mainMod SHIFT, O, movetoworkspace, $brow_ws
bind = $mainMod SHIFT, E, movetoworkspace, $test_ws

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 1%-
