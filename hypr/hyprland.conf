source = ~/.config/hypr/env.conf
source = ~/.config/hypr/startup.conf
source = ~/.config/hypr/conf.d/*.conf

# env = HYPRCURSOR_THEME,Bibata-Modern-Ice
# env = WLR_NO_HARDWARE_CURSORS,1
# env = HYPRCURSOR_SIZE,100
# env = GDK_SCALE,1
env = XCURSOR_SIZE,84

env = QT_QPA_PLATFORMTHEME, qt5ct
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

$mainMod = SUPER
$term = kitty
$brow = zen
$test_brow = firefox
$editor = nvim
$craft_ws = 2
$brow_ws = 3
$test_ws = 4

monitor = $monitor_laptop,preferred,auto,1
monitor = HDMI-A-1,preferred,auto,1

input {
    kb_layout = us
    resolve_binds_by_sym = 1
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
        disable_while_typing = true
        clickfinger_behavior = true
    }
    repeat_rate = 100
    repeat_delay = 200

    # scroll_factor = 0.1
    # emulate_discrete_scroll = 1
}

device {
    name = $laptop_keyboard_name
    kb_variant = dvorak
    kb_options = caps:swapescape
}

gestures {
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

cursor {
  inactive_timeout = 100
  default_monitor = HDMI-A-1
  hide_on_key_press = true
  warp_back_after_non_mouse_input = false
}


general {
    gaps_in = 0
    gaps_out = 4
    border_size = 1
    col.active_border = rgba(33ccff4a) rgba(00ff994a) 45deg
    col.inactive_border = rgba(5959591a)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
  shadow {
    enabled = false
  }
  rounding = 0
  blur {
    enabled = true
    size = 6
    passes = 1
    contrast = 3
    brightness = 0.10
    popups_ignorealpha = 0.6
    new_optimizations = on
  }
}

dwindle {
	preserve_split = true
	smart_split = false
	smart_resizing = false
    force_split = 2
}

misc {
    vfr = 1
    vrr = 1
    focus_on_activate = true
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    allow_session_lock_restore = true
}

animations {
    enabled = false
}

workspace=1,monitor:$monitor_laptop
workspace=$craft_ws,monitor:$monitor_external
workspace=$brow_ws,monitor:$monitor_external
workspace=$test_ws,monitor:$monitor_external

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = ignore-phantom-windows
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = on
}

windowrule {
    name = ws-test-browser
    match:class = ^$test_brow$

    workspace = $test_ws
}

windowrule {
    name = ws-browser
    match:class = ^$brow$

    workspace = $brow_ws
}

windowrule {
    name = ws-slack
    match:class = ^$slack$

    workspace = $slack_ws
}

windowrule {
    name = no-kitty-on-brow
    match:class = ^(kitty)$
    match:workspace = $brow_ws

    workspace = $craft_ws
}

windowrule {
    name = no-kitty-on-test
    match:class = ^(kitty)$
    match:workspace = $test_ws

    workspace = $craft_ws
}

# windowrule {
#     name = hide-scrcpy
#     match:class = ^(scrcpy)$
#
#     float = on
#     size = 1 1
#     move = -2000 -2000
#     opacity = 0.0 override 0.0 override
#     no_anim = on
#     border_size = 0
#     no_shadow = on
#     no_blur = on
#     pin = on
# }

windowrule {
    name = norrow terminal 
    match:class = ^(kitty|zen|com.mitchellh.ghostty|sioyek|neovide|Alacritty)$

    size = (monitor_w*0.6) (monitor_h)
    center = on
    pseudo = on
}

workspace = special:notes, on-created-empty: bash -c "cd ~/obsidian && neovide"
workspace = special:read, on-created-empty: alacritty --hold -e bash -c "cd ~/projects/focus_read && ./focus_read --paste"

windowrule {
    name = read-popups
    match:workspace = name:special:read
    match:workspace = name:special:notes
}

# Chatbot popup
bind = $mainMod, L, togglespecialworkspace, read 
bind = $mainMod, S, togglespecialworkspace, notes

bind = $mainMod, Return, exec, $term
bind = $mainMod, Space, cyclenext
bind = $mainMod , C, killactive
bind = $mainMod SHIFT, M, exit
bind = $mainMod, W, exec, makoctl dismiss
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = $mainMod + SHIFT, R, exec, rofi -modi emoji -show emoji
bind = $mainMod + SHIFT, C, exec, /home/yohansh/.config/hypr/rofi-wifi.sh
bind = $mainMod, M, exec, python /home/yohansh/.config/hypr/rofi-todo.py
bind = $mainMod, R, exec, rofi -show drun
bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = SUPER SHIFT, V, exec, /home/yohansh/.config/hypr/rofi-prompt.py
bind = SUPER SHIFT, Space, exec, voxtype record toggle 

bind = $mainMod, Q, workspace, 1
bind = $mainMod, A, workspace, $craft_ws
bind = $mainMod, O, workspace, $brow_ws
bind = $mainMod, E, workspace, $test_ws
# bindr = $mainMod, A, exec, ~/.config/hypr/delayed_switch.sh 2
# bindr = $mainMod, O, exec, ~/.config/hypr/delayed_switch.sh 3
# bindr = $mainMod, E, exec, ~/.config/hypr/delayed_switch.sh 4


bind = $mainMod SHIFT, Q, movetoworkspace, 1
bind = $mainMod SHIFT, A, movetoworkspace, $craft_ws
bind = $mainMod SHIFT, O, movetoworkspace, $brow_ws
bind = $mainMod SHIFT, E, movetoworkspace, $test_ws

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 1%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 1%-

