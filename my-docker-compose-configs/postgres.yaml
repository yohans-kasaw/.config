services:
  postgres-db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: strongpassword123 
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 2s
      retries: 3
    volumes:
      - /home/yohansh/postgres_instances/selfware:/var/lib/postgresql
